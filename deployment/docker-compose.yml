version: '3.8'

services:
  dw_postgres:
    image: postgres:15-alpine
    container_name: dash_dw_postgres
    restart: always
    environment:
      POSTGRES_USER: dw_admin
      POSTGRES_PASSWORD: dw_super_password123
      POSTGRES_DB: sankhya_dw
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dw_admin -d sankhya_dw"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
